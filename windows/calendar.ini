MouseLeaveAction=[!SetOption IlluminateButton Shape "Rectangle 194,388,168,32,8 | Fill Color 9,105,218 | StrokeWidth 0"][!UpdateMeter IlluminateButton][!Redraw]

[IlluminateButtonText]
Meter=String
StringAlign=Center
X=278
Y=397
FontFace=Segoe UI Semibold
FontSize=11
FontColor=255,255,255
AntiAlias=1
Text=Click Today

