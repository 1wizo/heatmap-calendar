; ---- Night Mode button (left) ----

[NightModeButton]
Meter=Shape
Shape=Rectangle 18,388,168,32,8 | Fill Color 240,246,252 | StrokeWidth 1 | Stroke Color 208,215,222
LeftMouseUpAction=[!CommandMeasure CalendarScript "ToggleNightMode()"]
MouseOverAction=[!SetOption NightModeButton Shape "Rectangle 18,388,168,32,8 | Fill Color 224,242,254 | StrokeWidth 1 | Stroke Color 208,215,222"][!UpdateMeter NightModeButton][!Redraw]
MouseLeaveAction=[!SetOption NightModeButton Shape "Rectangle 18,388,168,32,8 | Fill Color 240,246,252 | StrokeWidth 1 | Stroke Color 208,215,222"][!UpdateMeter NightModeButton][!Redraw]

[NightModeButtonText]
Meter=String
StringAlign=Center
X=102
Y=397
FontFace=Segoe UI Semibold
FontSize=11
FontColor=31,35,40
AntiAlias=1
Text=Night Mode

; ---- Toggle Today button (right) ----

[IlluminateButton]
Meter=Shape
Shape=Rectangle 194,388,168,32,8 | Fill Color 9,105,218 | StrokeWidth 0
LeftMouseUpAction=[!CommandMeasure CalendarScript "ToggleIlluminate()"]
