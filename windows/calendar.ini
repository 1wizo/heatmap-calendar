; ============================================================
;  GitHub Heatmap Calendar  -  v3 (toggle + night mode)
;  Click any day cell to toggle it ON (green) or OFF (white).
;  Toggled state persists in toggledDays.txt next to this .ini.
;  Two buttons: Night Mode + Toggle Today.
; ============================================================

[Rainmeter]
Update=1000
DynamicWindowSize=1
AccurateText=1
; BackgroundMode=0 = no skin-window background; rely on [Background] meter
BackgroundMode=0
; Right-click context menu
ContextTitle=Click Today (+1)
ContextAction=[!CommandMeasure CalendarScript "ToggleIlluminate()"]
ContextTitle2=Toggle Night Mode
ContextAction2=[!CommandMeasure CalendarScript "ToggleNightMode()"]
ContextTitle3=Toggle Minimal Mode
ContextAction3=[!CommandMeasure CalendarScript "ToggleMinimalMode()"]
ContextTitle4=Toggle Click-Through
ContextAction4=[!CommandMeasure CalendarScript "ToggleClickThrough()"]
ContextTitle5=---
ContextTitle6=Max Clicks: 1
ContextAction6=[!CommandMeasure CalendarScript "SetMaxClicks(1)"]
ContextTitle7=Max Clicks: 2
ContextAction7=[!CommandMeasure CalendarScript "SetMaxClicks(2)"]
ContextTitle8=Max Clicks: 3
ContextAction8=[!CommandMeasure CalendarScript "SetMaxClicks(3)"]
ContextTitle9=Max Clicks: 4
ContextAction9=[!CommandMeasure CalendarScript "SetMaxClicks(4)"]
ContextTitle10=Max Clicks: 5
ContextAction10=[!CommandMeasure CalendarScript "SetMaxClicks(5)"]
ContextTitle11=Max Clicks: 8
ContextAction11=[!CommandMeasure CalendarScript "SetMaxClicks(8)"]
ContextTitle12=Max Clicks: 10
ContextAction12=[!CommandMeasure CalendarScript "SetMaxClicks(10)"]
ContextTitle13=---
ContextTitle14=Position: Top-Right
ContextAction14=[!CommandMeasure CalendarScript "PositionTopRight()"]
ContextTitle15=Position: Bottom-Right
ContextAction15=[!CommandMeasure CalendarScript "PositionBottomRight()"]
ContextTitle16=Reload + Refresh
ContextAction16=[!CommandMeasure CalendarScript "Refresh()"][!Refresh]

[Variables]
SkinName=RainmeterCalendar

; ---- Measures ----

[CalendarScript]
Measure=Script
ScriptFile=#CURRENTPATH#calendar.lua

; ---- Background panel ----

[Background]
Meter=Shape
Shape=Rectangle 0,0,380,430,12 | Fill Color 255,255,255 | StrokeWidth 1 | Stroke Color 208,215,222

[MonthTitle]
Meter=String
StringAlign=Left
X=18
Y=18
FontFace=Segoe UI Semibold
FontSize=14
FontColor=31,35,40
AntiAlias=1
Text=Loading...

[TodayBadge]
Meter=String
StringAlign=Right
X=362
Y=22
FontFace=Segoe UI
FontSize=10
FontColor=9,105,218
AntiAlias=1
Text=?

